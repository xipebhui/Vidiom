<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vidiom Studio</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">V</span>
          <div>
            <strong>Vidiom Studio</strong>
            <span id="projectStatus">Ready</span>
          </div>
        </div>
        <div class="top-actions">
          <button id="refreshProjects" class="icon-button" title="刷新项目">
            <span aria-hidden="true">↻</span>
          </button>
          <button id="exportProject" class="icon-button" title="下载成片包" disabled>
            <span aria-hidden="true">⇩</span>
          </button>
          <button id="duplicateProject" class="icon-button" title="复制为草稿" disabled>
            <span aria-hidden="true">⧉</span>
          </button>
          <button id="resetProject" class="icon-button" title="重置失败运行" disabled>
            <span aria-hidden="true">↺</span>
          </button>
          <button id="pauseProject" class="icon-button" title="暂停运行" disabled>
            <span aria-hidden="true">Ⅱ</span>
          </button>
          <button id="runProject" class="primary-button" disabled>运行 Agent</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar">
          <section class="panel seed-panel">
            <label for="seedText">一句话</label>
            <textarea
              id="seedText"
              name="seed_text"
              rows="7"
              placeholder="一个北漂剪辑师发现客户给的素材里藏着未来事故。"
            ></textarea>
            <div class="brief-grid">
              <label for="seedDuration">时长</label>
              <select id="seedDuration" name="duration_minutes">
                <option value="3">3 分钟</option>
                <option value="5" selected>5 分钟</option>
                <option value="8">8 分钟</option>
              </select>
              <label for="seedAspect">画幅</label>
              <select id="seedAspect" name="aspect_ratio">
                <option value="9:16 vertical" selected>9:16 竖屏</option>
                <option value="1:1 square">1:1 方屏</option>
                <option value="16:9 landscape">16:9 横屏</option>
              </select>
              <label for="seedTone">语气</label>
              <input id="seedTone" name="tone" maxlength="80" value="强钩子、快反转、可拍摄" />
              <label for="seedAudience">观众</label>
              <input id="seedAudience" name="target_audience" maxlength="120" value="18-35 岁短剧用户" />
              <label for="seedMustInclude">必含要素</label>
              <textarea
                id="seedMustInclude"
                name="must_include"
                rows="3"
                maxlength="500"
              ></textarea>
            </div>
            <button id="createProject" class="primary-button full-width">生成画布</button>
          </section>

          <section class="panel projects-panel">
            <div class="panel-title">Projects</div>
            <div class="project-filters">
              <label class="sr-only" for="projectSearch">搜索项目</label>
              <input id="projectSearch" type="search" placeholder="搜索标题或一句话" autocomplete="off" />
              <label class="sr-only" for="projectStatusFilter">筛选状态</label>
              <select id="projectStatusFilter">
                <option value="">全部状态</option>
                <option value="draft">Draft</option>
                <option value="running">Running</option>
                <option value="paused">Paused</option>
                <option value="completed">Completed</option>
                <option value="failed">Failed</option>
              </select>
            </div>
            <div id="projectList" class="project-list"></div>
          </section>
        </aside>

        <section class="canvas-panel" aria-label="Agent canvas">
          <div class="canvas-toolbar">
            <div>
              <span id="canvasTitle" class="canvas-title">Untitled</span>
              <span id="canvasMeta" class="canvas-meta"></span>
            </div>
            <div id="runProgress" class="run-progress"></div>
          </div>
          <div class="canvas-viewport">
            <div id="canvasBoard" class="canvas-board">
              <svg id="edgeLayer" class="edge-layer" viewBox="0 0 1480 640"></svg>
              <div id="nodeLayer" class="node-layer"></div>
            </div>
          </div>
        </section>

        <aside class="inspector">
          <section class="panel">
            <div class="panel-title">Inspector</div>
            <div id="inspectorBody" class="inspector-body"></div>
          </section>
          <section class="panel readiness-panel">
            <div class="panel-title">Run Readiness</div>
            <div id="runReadiness" class="run-readiness"></div>
          </section>
          <section class="panel review-panel">
            <div class="panel-title">Review</div>
            <div class="review-tabs" role="tablist" aria-label="成片审阅">
              <button class="review-tab active" data-review-tab="script" type="button">脚本</button>
              <button class="review-tab" data-review-tab="characters" type="button">角色</button>
              <button class="review-tab" data-review-tab="production" type="button">拍摄</button>
              <button class="review-tab" data-review-tab="images" type="button">图像</button>
              <button class="review-tab" data-review-tab="storyboard" type="button">故事板</button>
              <button class="review-tab" data-review-tab="quality" type="button">检查</button>
              <button class="review-tab" data-review-tab="delivery" type="button">交付</button>
            </div>
            <div id="scriptPreview" class="script-preview"></div>
          </section>
          <section class="panel activity-panel">
            <div class="panel-title">Timeline</div>
            <div id="runtimeSummary" class="runtime-summary"></div>
            <div id="activityTimeline" class="activity-timeline"></div>
          </section>
        </aside>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
